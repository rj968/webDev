<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Calculator</title>

    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <output class="row" id="output-box"></output>

            <div class="row" id="one">
                <button class="number" id="7">7</button>
                <button class="number" id="8">8</button>
                <button class="number" id="9">9</button>
                <button class="symbol" id="divide">/</button>
            </div>

            <div class="row" id="two">
                <button class="number" id="4">4</button>
                <button class="number" id="5">5</button>
                <button class="number" id="6">6</button>
                <button class="symbol" id="multiply">*</button>
            </div>

            <div class="row" id="three">
                <button class="number" id="1">1</button>
                <button class="number" id="2">2</button>
                <button class="number" id="3">3</button>
                <button class="symbol" id="subtract">-</button>
            </div>

            <div class="row" id="four">
                <button class="point" id="point">.</button>
                <button class="number" id="0">0</button>
                <button class="symbol" id="add">+</button>
            </div>

            <div class="row" id="five">
                <button id="clear">clear</button>
                <button id="backspace">⌫</button>
                <button id="equals">=</button>
            </div>
        </div>
    </div>
</body>
</html>
